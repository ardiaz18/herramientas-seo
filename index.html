
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Repositorio de herramientas de IA del equipo SEO</title>
<style>
  :root{
    --tinta:#231815;
    --tinta-suave:#5b524e;
    --humo:#8d8681;
    --papel:#f6f6f6;
    --blanco:#ffffff;
    --naranja:#f07e26;
    --naranja-claro:#fdf1e7;
    --linea:#e3dfdb;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--papel);color:var(--tinta);
    font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,sans-serif;
    line-height:1.5;
  }
  .contenedor{max-width:960px;margin:0 auto;padding:0 20px}
  header{background:var(--blanco);border-bottom:1px solid var(--linea)}
  .barra{display:flex;align-items:center;gap:20px;padding:18px 0;flex-wrap:wrap}
  .logo{height:44px;width:auto;display:block}
  nav{margin-left:auto;display:flex;gap:18px;flex-wrap:wrap}
  nav a{color:var(--tinta-suave);text-decoration:none;font-size:14px;font-weight:500}
  nav a:hover{color:var(--naranja)}
  h1{
    font-size:clamp(24px,4.2vw,36px);margin:0;padding:26px 0 30px;
    font-weight:700;letter-spacing:-.02em;line-height:1.15;
  }
  h1 em{font-style:normal;color:var(--naranja)}
  main{padding-bottom:80px}
  .buscador{position:relative}
  input{
    width:100%;padding:16px 16px 16px 46px;font-size:17px;
    background:var(--blanco);border:1px solid var(--linea);border-radius:10px;
    color:var(--tinta);font-family:inherit;box-shadow:0 1px 2px rgba(35,24,21,.04);
  }
  input:focus{outline:2px solid var(--naranja);outline-offset:1px;border-color:transparent}
  .lupa{position:absolute;left:17px;top:50%;transform:translateY(-50%);color:var(--humo);font-size:18px}
  .sugerencias{
    position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:20;
    background:var(--blanco);border:1px solid var(--linea);border-radius:10px;
    box-shadow:0 10px 30px rgba(35,24,21,.12);overflow:hidden;
  }
  .sugerencias[hidden]{display:none}
  .sug{
    display:block;width:100%;text-align:left;background:none;border:0;
    padding:11px 16px;font-family:inherit;font-size:15px;color:var(--tinta);cursor:pointer;
    border-bottom:1px solid var(--linea);
  }
  .sug:last-child{border-bottom:0}
  .sug:hover,.sug[aria-selected="true"]{background:var(--naranja-claro)}
  .sug small{display:block;color:var(--humo);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
  .sug mark{background:none;color:var(--naranja);font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 24px}
  .chip{
    background:var(--blanco);border:1px solid var(--linea);color:var(--tinta-suave);
    padding:6px 13px;border-radius:999px;font-size:13px;cursor:pointer;font-family:inherit;
  }
  .chip:hover{border-color:var(--naranja);color:var(--naranja)}
  .chip[aria-pressed="true"]{background:var(--naranja);color:#fff;border-color:var(--naranja);font-weight:600}
  .conteo{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--humo);margin:0 0 12px}
  .ficha{
    border:1px solid var(--linea);border-radius:12px;padding:18px 20px;margin-bottom:12px;
    background:var(--blanco);
  }
  .etiqueta{
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--naranja);
    font-weight:700;display:block;margin-bottom:6px;
  }
  .ficha h2{margin:0;font-size:18px;font-weight:650}
  .ficha p{margin:6px 0 0;color:var(--tinta-suave);font-size:14px}
  .herramientas{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .herramientas a{
    display:inline-block;padding:7px 12px;border:1px solid var(--linea);border-radius:8px;
    color:var(--tinta);text-decoration:none;font-size:14px;background:var(--papel);
  }
  .herramientas a:hover{border-color:var(--naranja);color:var(--naranja);background:var(--naranja-claro)}
  .herramientas a span{color:var(--humo);font-size:12px;margin-left:6px}
  .vacio{border:1px dashed var(--linea);border-radius:12px;padding:32px;text-align:center;color:var(--tinta-suave);background:var(--blanco)}
  .vacio strong{display:block;margin-bottom:6px}
  @media (prefers-reduced-motion:no-preference){.ficha{transition:border-color .15s}}
</style>

   h:[["1Password Generator","https://1password.com/password-generator/"],["Lorem Ipsum","https://www.lipsum.com/"],["QR Code Monkey","https://www.qrcode-monkey.com/"],["ChatGPT","https://chatgpt.com/"],["Claude","https://claude.ai/"]]}
];

const lista = document.getElementById('lista');
const conteo = document.getElementById('conteo');
const q = document.getElementById('q');
const chips = document.getElementById('chips');
const caja = document.getElementById('sugerencias');
let filtro = null, marcado = -1;

const cats = [...new Set(CATALOGO.map(x => x.c))];
cats.forEach(c => {
  const b = document.createElement('button');
  b.className = 'chip'; b.textContent = c; b.setAttribute('aria-pressed','false');
  b.onclick = () => { filtro = (filtro === c) ? null : c; cerrar(); pintar(); };
  chips.appendChild(b);
});
document.querySelectorAll('nav a').forEach(a => {
  a.onclick = e => { e.preventDefault(); filtro = a.dataset.cat || null; q.value = ''; cerrar(); pintar(); };
});

function norm(s){ return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }

// Puntuación tolerante: no exige coincidencia exacta ni completa.
function puntuar(item, palabras){
  const titulo = norm(item.t), blob = norm(item.t+' '+item.k+' '+item.c+' '+item.n+' '+item.h.map(h=>h[0]).join(' '));
  let total = 0;
  for (const p of palabras){
    let mejor = 0;
    if (titulo.includes(p)) mejor = 10;
    else if (blob.includes(p)) mejor = 6;
    else {
      for (const tok of blob.split(/[^a-z0-9]+/)){
        if (!tok) continue;
        if (tok.startsWith(p.slice(0, Math.max(3, p.length-2)))) { mejor = Math.max(mejor, 4); continue; }
        if (p.length > 3 && distancia(tok, p) <= (p.length > 6 ? 2 : 1)) mejor = Math.max(mejor, 3);
      }
    }
    if (!mejor) return 0;      // toda palabra debe aportar algo
    total += mejor;
  }
  return total;
}

function distancia(a, b){
  if (Math.abs(a.length - b.length) > 3) return 99;
  const f = Array.from({length:b.length+1},(_,i)=>i);
  for (let i=1;i<=a.length;i++){
    let prev = f[0]; f[0] = i;
    for (let j=1;j<=b.length;j++){
      const tmp = f[j];
      f[j] = Math.min(f[j]+1, f[j-1]+1, prev + (a[i-1]===b[j-1]?0:1));
      prev = tmp;
    }
  }
  return f[b.length];
}

function resultados(){
  const palabras = norm(q.value.trim()).split(/\s+/).filter(Boolean);
  let res = CATALOGO.filter(x => !filtro || x.c === filtro);
  if (!palabras.length) return res;
  return res.map(x => ({x, s: puntuar(x, palabras)}))
            .filter(o => o.s > 0)
            .sort((a,b) => b.s - a.s)
            .map(o => o.x);
}

function resaltar(texto){
  const palabras = norm(q.value.trim()).split(/\s+/).filter(p => p.length > 1);
  if (!palabras.length) return texto;
  let salida = '', i = 0;
  const base = norm(texto);
  const marcas = [];
  palabras.forEach(p => { let k = base.indexOf(p); if (k > -1) marcas.push([k, k+p.length]); });
  marcas.sort((a,b)=>a[0]-b[0]);
  marcas.forEach(([a,b]) => { if (a < i) return; salida += texto.slice(i,a) + '<mark>' + texto.slice(a,b) + '</mark>'; i = b; });
  return salida + texto.slice(i);
}

function cerrar(){ caja.hidden = true; q.setAttribute('aria-expanded','false'); marcado = -1; }

function sugerir(){
  const term = q.value.trim();
  if (term.length < 2) return cerrar();
  const res = resultados().slice(0, 6);
  if (!res.length) return cerrar();
  caja.innerHTML = res.map((x,i) =>
    `<button class="sug" role="option" data-i="${i}" aria-selected="false"><small>${x.c}</small>${resaltar(x.t)}</button>`
  ).join('');
  [...caja.children].forEach((b,i) => b.onclick = () => { q.value = res[i].t; cerrar(); pintar(); });
  caja.hidden = false; q.setAttribute('aria-expanded','true'); marcado = -1;
}

function pintar(){
  const res = resultados();
  [...chips.children].forEach(b => b.setAttribute('aria-pressed', String(b.textContent === filtro)));
  conteo.textContent = res.length + (res.length === 1 ? ' resultado' : ' resultados');

  if (!res.length){
    lista.innerHTML = '<div class="vacio"><strong>Sin coincidencias</strong>Prueba con otra palabra. Si la tarea no está aquí, dísela a Alicia y la añadimos.</div>';
    return;
  }
  lista.innerHTML = res.map(x => `
    <article class="ficha">
      <span class="etiqueta">${x.c}</span>
      <h2>${x.t}</h2>
      <p>${x.n}</p>
      <div class="herramientas">
        ${x.h.map(([n,u]) => `<a href="${u}" target="_blank" rel="noopener">${n}<span>↗</span></a>`).join('')}
      </div>
    </article>`).join('');
}

q.addEventListener('input', () => { sugerir(); pintar(); });
q.addEventListener('keydown', e => {
  const ops = [...caja.children];
  if (caja.hidden || !ops.length) return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp'){
    e.preventDefault();
    marcado = (marcado + (e.key === 'ArrowDown' ? 1 : ops.length - 1)) % ops.length;
    ops.forEach((o,i) => o.setAttribute('aria-selected', String(i === marcado)));
  } else if (e.key === 'Enter' && marcado > -1){
    e.preventDefault(); ops[marcado].click();
  } else if (e.key === 'Escape'){ cerrar(); }
});
document.addEventListener('click', e => { if (!e.target.closest('.buscador')) cerrar(); });

pintar();
</script>
